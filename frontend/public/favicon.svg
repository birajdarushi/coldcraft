<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Coldcraft mark: solid square + inner square + accent corner. Blue-forward
       so it stays visible on both light and dark browser tabs. -->
  <rect x="4" y="4" width="20" height="20" fill="#0055FF"/>
  <rect x="10.5" y="10.5" width="7" height="7" fill="#FFFFFF"/>
  <rect x="21" y="21" width="7" height="7" fill="#0A0A0A"/>
</svg>
